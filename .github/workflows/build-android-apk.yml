name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version_message:
        description: "Descripción del build (opcional)"
        required: false
        default: "Build manual"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Instalar EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verificar secrets requeridos
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "❌ Secret EXPO_TOKEN no configurado en GitHub"
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "❌ Secret GOOGLE_SERVICES_JSON no configurado en GitHub"
            echo "   Creá el proyecto en https://console.firebase.google.com"
            echo "   Paquete Android: com.auditstock.inventario"
            echo "   Descargá google-services.json y pegá su contenido como secret"
            exit 1
          fi
          echo "✅ Secrets OK"

      - name: Crear google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > artifacts/inventario-audit/google-services.json
          echo "✅ google-services.json creado"

      - name: Build APK (local, sin consumir créditos EAS)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd artifacts/inventario-audit
          eas build \
            --local \
            --platform android \
            --profile preview \
            --non-interactive \
            --output /tmp/AuditStock.apk
        
      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AuditStock-v14-${{ github.run_number }}
          path: /tmp/AuditStock.apk
          retention-days: 14
          if-no-files-found: error

      - name: Resumen del build
        run: |
          ls -lh /tmp/AuditStock.apk
          echo "✅ APK listo — descargalo desde la pestaña Artifacts en GitHub Actions"
