name: Build Android APK

  on:
    workflow_dispatch:
      inputs:
        version_message:
          description: "Descripción del build (opcional)"
          required: false
          default: "Build manual"

  jobs:
    build:
      runs-on: ubuntu-latest
      timeout-minutes: 90
      permissions:
        contents: write

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Liberar espacio en disco
          run: |
            sudo rm -rf /usr/share/dotnet /opt/ghc
            sudo apt-get clean
            df -h

        - name: Setup Node.js 20
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Install pnpm
          run: npm install -g pnpm@10

        - name: Setup JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: "17"
            distribution: "temurin"

        - name: Instalar dependencias
          run: pnpm install --no-frozen-lockfile --shamefully-hoist

        - name: Expo Prebuild
          env:
            EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          run: npx expo prebuild --platform android --no-install --clean

        - name: Cache Gradle
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
            key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
            restore-keys: gradle-${{ runner.os }}-
            save-always: true

        - name: Build APK
          run: |
            echo "sdk.dir=$ANDROID_HOME" > android/local.properties
            cd android
            chmod +x gradlew
            ./gradlew assembleRelease --no-daemon \
              -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=2g" \
              -Dorg.gradle.workers.max=2 \
              --build-cache
            cp app/build/outputs/apk/release/app-release.apk /tmp/AuditStock.apk

        - name: Leer versionCode
          id: ver
          run: |
            CODE=$(node -e "console.log(require('./app.json').expo.android.versionCode)")
            echo "code=$CODE" >> "$GITHUB_OUTPUT"
            echo "tag=v$CODE" >> "$GITHUB_OUTPUT"
            echo "name=AuditStock v$CODE" >> "$GITHUB_OUTPUT"
            echo "VersionCode detectado: $CODE"

        - name: Subir APK como artefacto
          uses: actions/upload-artifact@v4
          with:
            name: AuditStock-${{ steps.ver.outputs.tag }}-build${{ github.run_number }}
            path: /tmp/AuditStock.apk
            retention-days: 30
            if-no-files-found: error

        - name: Publicar GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ steps.ver.outputs.tag }}
            name: ${{ steps.ver.outputs.name }} (Build #${{ github.run_number }})
            body: |
              ## AuditStock ${{ steps.ver.outputs.tag }}

              Build #${{ github.run_number }} — ${{ github.event.inputs.version_message || 'Build automático' }}

              ### Instalación
              1. Descargá el archivo `AuditStock.apk` de abajo
              2. Abrilo en el dispositivo Android
              3. Si Android pregunta, permitir instalar desde fuentes desconocidas
            files: /tmp/AuditStock.apk
            make_latest: true
            fail_on_unmatched_files: true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Resumen
          run: |
            ls -lh /tmp/AuditStock.apk
            echo "✅ Release ${{ steps.ver.outputs.tag }} publicado en GitHub"
  