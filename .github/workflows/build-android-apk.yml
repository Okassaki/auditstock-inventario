name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version_message:
        description: "Descripción del build (opcional)"
        required: false
        default: "Build manual"
  push:
    branches: [main]
    paths:
      - "artifacts/inventario-audit/app/**"
      - "artifacts/inventario-audit/components/**"
      - "artifacts/inventario-audit/utils/**"
      - "artifacts/inventario-audit/context/**"
      - "artifacts/inventario-audit/package.json"
      - "artifacts/inventario-audit/app.json"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    defaults:
      run:
        working-directory: artifacts/inventario-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Liberar espacio en disco
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc
          sudo apt-get clean
          df -h
        working-directory: ${{ github.workspace }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@10
        working-directory: ${{ github.workspace }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Instalar dependencias
        run: pnpm install --no-frozen-lockfile --shamefully-hoist
        working-directory: ${{ github.workspace }}

      - name: Expo Prebuild
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo prebuild --platform android --no-install --clean

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('artifacts/inventario-audit/android/**/*.gradle*', 'artifacts/inventario-audit/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
          save-always: true

      - name: Build APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=2g" \
            -Dorg.gradle.workers.max=2 \
            --build-cache
          cp app/build/outputs/apk/release/app-release.apk /tmp/AuditStock.apk

      - name: Leer versionCode
        id: ver
        run: |
          CODE=$(node -e "console.log(require('./app.json').expo.android.versionCode)")
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v$CODE" >> "$GITHUB_OUTPUT"
          echo "VersionCode: $CODE"

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AuditStock-${{ steps.ver.outputs.tag }}-build${{ github.run_number }}
          path: /tmp/AuditStock.apk
          retention-days: 30
          if-no-files-found: error

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "AuditStock ${{ steps.ver.outputs.tag }} (Build #${{ github.run_number }})"
          body: |
            ## AuditStock ${{ steps.ver.outputs.tag }}
            Build #${{ github.run_number }}
            ${{ github.event.inputs.version_message || '' }}
            ### Instalar
            Descargá el archivo `AuditStock.apk` de abajo y abrilo en tu Android.
          files: /tmp/AuditStock.apk
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resumen
        run: |
          ls -lh /tmp/AuditStock.apk
          echo "✅ Release ${{ steps.ver.outputs.tag }} publicado"
        working-directory: ${{ github.workspace }}
